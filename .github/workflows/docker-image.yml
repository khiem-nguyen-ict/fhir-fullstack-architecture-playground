name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  unit-test:
    runs-on: ubuntu-latest
    if: github.event_name != 'push' || github.ref != 'refs/heads/main'
    strategy:
      matrix:
        service:
          - name: patient-service
            working-directory: services/patient-service
          - name: frontend
            working-directory: frontend
          - name: bff
            working-directory: bff
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        if: matrix.service.name == 'patient-service'
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v5
        if: matrix.service.name != 'patient-service'
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ matrix.service.working-directory }}
        if: matrix.service.name != 'patient-service'

      - name: Run tests for ${{ matrix.service.name }}
        run: mvn test
        working-directory: ${{ matrix.service.working-directory }}
        if: matrix.service.name == 'patient-service'

      - name: Run tests for ${{ matrix.service.name }}
        run: npm test
        working-directory: ${{ matrix.service.working-directory }}
        if: matrix.service.name != 'patient-service'

  e2e-test:
    needs: unit-test
    runs-on: ubuntu-latest
    if: github.event_name != 'push' || github.ref != 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Start Docker services
        working-directory: infra
        run: docker compose up --build -d

      - name: Wait for services
        run: |
          for i in {1..60}; do curl -s http://localhost:8081/actuator/health && break || sleep 2; done
          for i in {1..60}; do curl -s http://localhost:4000/graphql -X POST -H "Content-Type: application/json" -d '{"query":"{__typename}"}' && break || sleep 2; done
          for i in {1..60}; do curl -s http://localhost:5173 && break || sleep 2; done

      - name: Run e2e tests
        working-directory: frontend
        run: npm run test:e2e -- --grep @smoke
        env:
          CI: true
          FRONTEND_URL: http://localhost:5173
          BFF_URL: http://localhost:4000
          PATIENT_SERVICE_URL: http://localhost:8081

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

      - name: Stop Docker services
        if: always()
        working-directory: infra
        run: docker compose down -v

  build:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          - name: patient-service
            context: services/patient-service
            dockerfile: services/patient-service/Dockerfile
          - name: frontend
            context: frontend
            dockerfile: frontend/Dockerfile
          - name: bff
            context: bff
            dockerfile: bff/Dockerfile
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for ${{ matrix.service.name }}
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: false
