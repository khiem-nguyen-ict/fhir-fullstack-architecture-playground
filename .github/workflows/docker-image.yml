name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: patient-service
            working-directory: services/patient-service
          - name: frontend
            working-directory: frontend
          - name: bff
            working-directory: bff
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        if: matrix.service.name == 'patient-service'
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v5
        if: matrix.service.name != 'patient-service'
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ matrix.service.working-directory }}
        if: matrix.service.name != 'patient-service'

      - name: Run tests for ${{ matrix.service.name }}
        run: mvn test
        working-directory: ${{ matrix.service.working-directory }}
        if: matrix.service.name == 'patient-service'

      - name: Run tests for ${{ matrix.service.name }}
        run: npm test
        working-directory: ${{ matrix.service.working-directory }}
        if: matrix.service.name != 'patient-service'

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          - name: patient-service
            context: services/patient-service
            dockerfile: services/patient-service/Dockerfile
          - name: frontend
            context: frontend
            dockerfile: frontend/Dockerfile
          - name: bff
            context: bff
            dockerfile: bff/Dockerfile
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v5

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for ${{ matrix.service.name }}
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: false
