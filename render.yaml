services:
  - type: web
    name: patient-service
    env: docker
    dockerfilePath: ./services/patient-service/Dockerfile
    dockerContext: ./services/patient-service/
    plan: free
    envVars:
      # 1. First, tell Render to fetch the raw db properties into these keys
      - key: DB_HOST
        fromDatabase:
          name: fhir-postgres-db
          property: host
      - key: DB_NAME
        fromDatabase:
          name: fhir-postgres-db
          property: database

      # 2. Render will substitute these inline correctly at build/deploy time
      - key: SPRING_DATASOURCE_URL
        value: "jdbc:postgresql://${DB_HOST}/${DB_NAME}"

      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: fhir-postgres-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: fhir-postgres-db
          property: password
  - type: web
    name: bff
    env: docker
    dockerfilePath: ./bff/Dockerfile
    dockerContext: ./bff/
    plan: free
    envVars:
      - key: PATIENT_SERVICE_URL
        fromService:
          name: patient-service
          property: hostport
          type: web
  - type: web
    name: frontend
    env: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend/
    plan: free
    envVars:
      - key: BFF_HOST
        fromService:
          name: bff
          property: host
          type: web
      - key: BFF_URL
        value: "https://${BFF_HOST}.onrender.com"
databases:
  - name: fhir-postgres-db
    databaseName: fhir_db
    user: fhir_user
    plan: free