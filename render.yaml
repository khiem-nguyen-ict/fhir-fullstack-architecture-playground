services:
  - type: web
    name: patient-service
    env: docker
    dockerfilePath: ./services/patient-service/Dockerfile
    dockerContext: ./services/patient-service/
    plan: free
    envVars:
      - key: SPRING_DATASOURCE_URL
        value: "jdbc:postgresql://${fhir-postgres-db.hostname}/${fhir-postgres-db.databaseName}"
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: fhir-postgres-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: fhir-postgres-db
          property: password
  - type: web
    name: bff
    env: docker
    dockerfilePath: ./bff/Dockerfile
    dockerContext: ./bff/
    plan: free
    envVars:
      - key: PATIENT_SERVICE_URL
        fromService:
          name: patient-service
          property: hostport
          type: web
  - type: web
    name: frontend
    env: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend/
    plan: free
    envVars:
      - key: BFF_URL
        value: https://bff.onrender.com
databases:
  - name: fhir-postgres-db
    databaseName: fhir_db
    user: fhir_user
    plan: free