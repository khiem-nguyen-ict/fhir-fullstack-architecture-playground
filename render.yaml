services:
  - type: web
    name: patient-service
    env: docker
    dockerfilePath: ./services/patient-service/Dockerfile
    dockerContext: ./services/patient-service/
    plan: free
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: fhir-postgres-db
          property: host
      - key: DB_NAME
        fromDatabase:
          name: fhir-postgres-db
          property: databaseName
      - key: SPRING_DATASOURCE_URL
        value: "jdbc:postgresql://$(DB_HOST)/$(DB_NAME)"
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: fhir-postgres-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: fhir-postgres-db
          property: password
  - type: web
    name: bff
    env: docker
    dockerfilePath: ./bff/Dockerfile
    dockerContext: ./bff/
    plan: free
    envVars:
      - key: PATIENT_SERVICE_URL
        fromService:
          name: patient-service
          property: hostport
          type: web
  - type: web
    name: frontend
    env: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend/
    plan: free
    envVars:
      - key: BFF_URL
        fromService:
          name: bff
          property: url
          type: web
databases:
  - name: fhir-postgres-db
    databaseName: fhir_db
    user: fhir_user
    plan: free