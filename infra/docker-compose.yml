services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: fhir
      POSTGRES_USER: fhir
      POSTGRES_PASSWORD: fhir
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fhir -d fhir"]
      interval: 5s
      timeout: 5s
      retries: 10

  patient-service:
    build:
      context: ../services/patient-service
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/fhir
      SPRING_DATASOURCE_USERNAME: fhir
      SPRING_DATASOURCE_PASSWORD: fhir
    depends_on:
      postgres:
        condition: service_healthy

  bff:
    build:
      context: ../bff
    ports:
      - "4000:4000"
    environment:
      PATIENT_SERVICE_URL: http://patient-service:8081
      PORT: 4000
    depends_on:
      - patient-service

  frontend:
    build:
      context: ../frontend
    ports:
      - "5173:5173"
    environment:
      BFF_URL: http://localhost:4000
      PORT: 5173
    depends_on:
      - bff

volumes:
  pgdata:
